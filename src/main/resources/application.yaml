spring:
  application:
    name: gateway-service

server:
  port: 8080

spring:
  cloud:
    gateway:
      mvc:
        routes:

          - id: catalog-service
            uri: http://localhost:8081
            predicates:
              - Path=/catalog/**
            filters:
              - StripPrefix=1

          - id: order-service
            uri: http://localhost:8082
            predicates:
              - Path=/orders/**
            filters:
              - StripPrefix=1

          - id: payment-service
            uri: http://localhost:8083
            predicates:
              - Path=/payments/**
            filters:
              - StripPrefix=1