server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: catalog-service
          uri: http://localhost:8081
          predicates:
            - Path=/books/**

        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/orders/**

        - id: payment-service
          uri: http://localhost:8083
          predicates:
            - Path=/payments/**
logging:
  level:
    org.springframework.cloud.gateway: DEBUG